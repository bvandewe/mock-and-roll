name: mock-api-dev
services:
  # http://localhost:8000/docs
  mock-api:
    image: mock-api-server
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "sh",
        "-c",
        "pip install debugpy -t /tmp && python /tmp/debugpy  --listen 0.0.0.0:5678 -m uvicorn src.main:app --host 0.0.0.0 --port 8080 --reload",
      ]
    ports:
      - 8000:8080
      - 5699:5678
    environment:
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # Application Configuration
      LOG_LEVEL: DEBUG
      APP_TITLE: Mock API Server
      CONFIG_FOLDER: /app/config
      # LOG_FILE: /app/logs/20000101_000000_basic_8000.logs  # REQUIRED for basic mock API
      LOG_FILE: /app/logs/20000101_000000_vmanage_8000.logs # REQUIRED for vManage mock API
    volumes:
      - ./src:/app/src
      # - ./configs/basic/:/app/config # Uncomment to mount the basic config directory...
      - ./configs/vmanage/:/app/config # Uncomment to mount the vManage config directory...
    depends_on:
      - redis
    networks:
      - mock-api-network

  # Redis cache server
  # redis-cli -h localhost -p 6379 keys '*'
  redis:
    image: redis:8.0.0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - mock-api-network

volumes:
  redis_data:

networks:
  mock-api-network:
    driver: bridge
